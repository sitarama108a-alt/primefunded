name: Terminal Price Feed Cron

on:
  schedule:
    - cron: "* * * * *"   # every 1 minute
  workflow_dispatch:

jobs:
  trigger-price-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Call price feed endpoint
        run: |
          curl -s -X GET "https://primefunded.fund/api/terminal/price-feed" \
            -H "x-api-key: ${{ secrets.TERMINAL_CRON_KEY }}"
