name: SL/TP & Risk Engine
on:
  schedule:
    - cron: '* * * * *'  # Run every 1 minute
  workflow_dispatch:

jobs:
  check-risk:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Risk Engine (T+0s)
        run: |
          curl -s -X GET \
            -H "x-api-key: ${{ secrets.TERMINAL_CRON_KEY }}" \
            https://primefunded.fund/api/terminal/trades/check-sl-tp
      
      - name: Wait 30s
        run: sleep 30

      - name: Trigger Risk Engine (T+30s)
        run: |
          curl -s -X GET \
            -H "x-api-key: ${{ secrets.TERMINAL_CRON_KEY }}" \
            https://primefunded.fund/api/terminal/trades/check-sl-tp

      - name: Daily Reset (2:00 AM UTC)
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          # Target exactly 02:00 or 02:01 to ensure one execution
          if [ "$HOUR" = "02" ] && [ "$MIN" = "00" ]; then
            echo "Starting 2:00 AM UTC reset protocol..."
            curl -s -X GET \
              -H "x-api-key: ${{ secrets.TERMINAL_CRON_KEY }}" \
              https://primefunded.fund/api/terminal/daily-reset
          else
            echo "Skipping reset: current UTC time is $HOUR:$MIN"
          fi
