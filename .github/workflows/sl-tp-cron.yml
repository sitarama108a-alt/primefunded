name: SL/TP Auto-Close
on:
  schedule:
    - cron: '* * * * *'  # Run every 1 minute
  workflow_dispatch:

jobs:
  check-risk:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Risk Engine (T+0s)
        run: |
          curl -s -X GET \
            -H "x-api-key: ${{ secrets.TERMINAL_CRON_KEY }}" \
            https://primefunded.fund/api/terminal/trades/check-sl-tp
      
      - name: Wait 30s
        run: sleep 30

      - name: Trigger Risk Engine (T+30s)
        run: |
          curl -s -X GET \
            -H "x-api-key: ${{ secrets.TERMINAL_CRON_KEY }}" \
            https://primefunded.fund/api/terminal/trades/check-sl-tp

      - name: Midnight Daily Reset
        run: |
          # Only run at exactly 00:00 UTC
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" = "00" ] && [ "$MIN" = "00" ]; then
            echo "Starting midnight reset protocol..."
            curl -s -X GET \
              -H "x-api-key: ${{ secrets.TERMINAL_CRON_KEY }}" \
              https://primefunded.fund/api/terminal/daily-reset
          else
            echo "Skipping reset: current UTC time is $HOUR:$MIN"
          fi
